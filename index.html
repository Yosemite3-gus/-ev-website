  <body>
    <script>
      // SPA redirect recovery for GitHub Pages
      (function() {
        var p = sessionStorage.getItem('gh_spa_redirect');
        if (p) {
          sessionStorage.removeItem('gh_spa_redirect');
          history.replaceState(null, '', p);
        }
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
